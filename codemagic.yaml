workflows:
  android-native-build:
    name: Blood Dragon Apex — Build APK
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      java: "17"
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    scripts:
      - name: Install Android NDK
        script: |
          SDKMANAGER=$(find "$ANDROID_SDK_ROOT" -name "sdkmanager" -type f 2>/dev/null | head -1)
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          yes | "$SDKMANAGER" "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $CM_ENV

      - name: Prepare Gradle Wrapper
        script: |
          chmod +x gradlew
          ./gradlew --version

      - name: Build APK Debug
        script: |
          ./gradlew assembleDebug --stacktrace
          echo "=== APK files found ==="
          find . -name "*.apk" -type f

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
